query ($taskId: Int) {
    smtasks {
        taskDetails(taskId: $taskId) {
            ...mainTaskFields
            ...detailTaskFields
            parentTask {
                ...mainTaskFields
            }
            childTasks {
                ...mainTaskFields
            }
        }
    }
}

fragment mainTaskFields on Task {
    id
    name
    descript
    addedFio
    addedPhoto
    dateplan
    status
    isMy
    myControl
    isGenerate
    hasOrig
    hasComm
    priority
    dateFact
    isRead
    caseId
    isFavorite
    docCaption
}

fragment detailTaskFields on Task {
    performerId
    performer
    performerPhoto
    htmlDescript
    declarer
    declarerId
    dateAdd
    dateFact
    docTextHtml
    arso
    keyValue
    kidCopy
    nextButtonText
    previousButtonText
    taskType
    caseId
    participants {
        userId
        userFio
        name
        role
    }
    originals {
        id
        fileName
        fileExt
        fileSize
    }
    comments {
        userId
        user
        userPhoto
        date
        text
    }
}

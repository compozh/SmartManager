query ($taskId: Int) {
    smtasks {
        taskDetails(taskId: $taskId) {
            ...mainTaskFields
            ...detailTaskFields
            parentTasks {
                ...mainTaskFields
            }
            childTasks {
                ...mainTaskFields
            }
        }
    }
}

fragment mainTaskFields on Task {
    id
    name
    descript
    performerId
    performer
    performerPhoto
    dateplan
    dateAdd
    status
    isMy
    myControl
    isGenerate
    hasOrig
    hasComm
    priority
    addedFio
    dateFact
    isRead
    caseId
}

fragment detailTaskFields on Task {
    htmlDescript
    declarer
    arso
    keyValue
    kidCopy
    nextButtonText
    previousButtonText
    taskType
    caseId
    participants {
        userId
        userFio
        name
        role
    }
    originals {
        id
        fileName
        fileExt
    }
    comments {
        userId
        user
        userPhoto
        date
        text
    }
}

query ($folderId: String) {
  smtasks {
    tasks(folderId: $folderId) {
      ...mainTaskFields
    }
  }
}

fragment mainTaskFields on Task {
  id
  name
  descript
  performerId
  performer
  performerPhoto
  dateplan
  dateAdd
  status
  isMy
  myControl
  isGenerate
  hasOrig
  hasComm
  priority
  dateFact
  isRead
}

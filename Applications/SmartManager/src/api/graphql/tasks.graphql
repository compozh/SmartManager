query ($folderId: String) {
  smtasks {
    tasks(folderId: $folderId) {
      ...mainTaskFields
    }
  }
}

fragment mainTaskFields on Task {
  id
  name
  descript
  addedFio
  addedPhoto
  dateplan
  status
  isMy
  myControl
  isGenerate
  hasOrig
  hasComm
  priority
  dateFact
  isRead
  caseId
  isFavorite
  docCaption
}

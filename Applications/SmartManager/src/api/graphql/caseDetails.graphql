query($caseId: Int!) {
    smtasks {
        caseDetails(caseId: $caseId) {
            id
            name
            purpose
            dateFrom
            dateTo
            comm
            fioAdd
            dateAdd
            hasOrig
            hasComm
            folderId
            tasks {
                id
                name
                descript
                performerId
                performer
                performerPhoto
                dateplan
                dateAdd
                addedFio
                status
                isMy
                myControl
                isGenerate
                hasOrig
                hasComm
                priority
                dateFact
                isRead
            }
            originals {
                id
                fileName
                fileExt
                fileSize
            }
            comments {
                userId
                user
                userPhoto
                date
                text
            }
            participants {
                userId
                name
            }
        }
    }
}

query ($taskId: Int) {
  smtasks {
    taskDetails(taskId: $taskId) {
      ...taskFields
      parentTasks {
        ...taskFields
      }
      childTasks {
        ...taskFields
      }
      parentTask {
        ...taskFields
      }
    }
  }
}

fragment taskFields on Task {
  id
  name
  descript
  htmlDescript
  declarerId
  declarer
  declarerPhoto
  performerId
  performer
  dateplan
  dateAdd
  status
  isMy
  myControl
  isGenerate
  needApprov
  needComm
  arso
  keyValue
  kidCopy
  hasOrig
  hasComm
  isAgree
  isResponsible
  childCount
  childDoneCount
  priority
  dateRemind
  addedId
  addedFio
  addedPhoto
  dateFact
  isRead
  caseId
  docCaption
  docText
  docPlanDate
  docImportant
  isDocTextHtml
  docType
  docOrg
  nextButtonText
  previousButtonText
  role
  participants {
    userId
    userFio
    name
    role
  }
  relArso
  relKeyValue
  relKidCopy
  relType
  relName
  originals {
    id
    ndor
    fileName
    user
    date
    isMy
    fileExt
    comm
    fileSize
    type
    typeName
    typeDescription
    isSign
    fileUrl
  }
  comments {
    userId
    user
    userPhoto
    date
    text
    isAgree
  }
  hasNewComment
}

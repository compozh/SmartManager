query($formCode: String!, $params: FormItemAutocompleteParamsInput!) {
    formioQuery {
        callItemAutocomplete(formCode: $formCode, params: $params) {
            values {
                code
                name
                barcode
            }
            mostSuitableValue {
                code
                name
                barcode
            }
            success
            errorMessage
            successMessage
            errorCode
        }
    }
}
query($formCode: String!, $properties: ProductionRegistrationParamsInput!, $deviceSizeType: String){
    mes{
        productionFormio(formCode: $formCode, properties: $properties, deviceSizeType: $deviceSizeType) {
            name
            components
            submission
            display
            settings
            success
            errorMessage
            successMessage
            errorCode
        }
    }
}
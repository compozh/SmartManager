query($lessonId: ID){
  lms{
    lessonContent(lessonGuid: $lessonId){
      content
      course{
        name
        courseGuid
      }
      module{
        name
        moduleGuid
      }
      lesson{
        unitId
        name
        lessonGuid
        durationMunute
        durationMinutesLabel
        surveyId
      }
    }
  }
}
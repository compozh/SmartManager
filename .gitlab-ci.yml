variables:
  PROJECT_NAME: 'SmartManager'
  SP_DIRECTORY: ''
 
stages:
  - build
  - deploy

build_job:
    stage: build
    tags:
    - tfs2017 
    script:
    - 'npm install'
    - 'npm run build'
    - 'dir'
    cache:
      key: "bin"
      paths:
      - .\dist\
    when: always

    
deploy_job:
    stage: deploy
    cache:
      key: "bin"
      paths:
      - .\dist\
    script:
    - 'mkdir \\it.ua\dfs\dev\itversion\$SP_DIRECTORY\$CI_COMMIT_REF_NAME\$PROJECT_NAME'
    - 'xcopy /S /E ".\dist\*" "\\it.ua\dfs\dev\itversion\$SP_DIRECTORY\$CI_COMMIT_REF_NAME\$PROJECT_NAME"'
    tags:
    - tfs2017

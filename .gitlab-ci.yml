variables:
  SP_DIR: ''
  
stages:
  - build
  - publish

build_smartManager:
    only:
      variables:
      - $SP_DIR != ''
    stage: build
    tags:
    - tfs2017 
    script:
    - 'npm install'
    - 'npm run build'
    - 'dir'
    cache:
      key: "bin"
      paths:
      - .\dist\
    
publish_smartManager_sp_dir:
    only:
      variables:
      - $SP_DIR != ''
    stage: publish
    cache:
      key: "bin"
      paths:
      - .\dist\
    script:
    - 'mkdir \\it.ua\dfs\private\Bakharev\sm\$SP_DIR'
    - 'xcopy /S /E ".\dist\*" "\\it.ua\dfs\private\Bakharev\sm\$SP_DIR\'
    tags:
    - tfs2017
    when: manual

stages:
  - build
  - publish

build_smartManager_to:
    stage: build
    tags:
    - tfs2017 
    script:
    - 'npm install'
    - 'npm run build'
    - 'dir'
    cache:
      key: "bin"
      paths:
      - .\dist\
    
publish_smartManager_to_SP_folder:
    rules:
      - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != "master"'
        when: manual
    stage: publish
    cache:
      key: "bin"
      paths:
      - .\dist\
    script:
    - 'mkdir \\it.ua\dfs\private\Bakharev\sm\$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
    - 'xcopy /S /E ".\dist\*" "\\it.ua\dfs\private\Bakharev\sm\$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME\"'
    tags:
    - tfs2017

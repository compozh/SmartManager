variables:
  PROJECT_NAME: 'SmartManager'
  SP_DIRECTORY: ''
 
stages:
  - build
  - deploy

build_job:
    stage: build
    tags:
    - tfs2017 
    script:
    - 'npm install'
    - 'npm run build'
    - 'dir'
    when: always
    
deploy_job:
    stage: deploy
    tags:
    - tfs2017
    script:
    - 'dir'
